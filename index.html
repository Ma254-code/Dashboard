<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #121212, #1e1e1e);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #1a1a1a;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      text-align: center;
      color: #fff;
      max-width: 400px;
      width: 90%;
    }

    p {
      font-size: 1.2em;
      margin-bottom: 30px;
      color: #ccc;
    }

    .buttons {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    a.button {
      flex: 1;
      background: #0072ff;
      color: white;
      padding: 12px;
      text-decoration: none;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      transition: background 0.3s ease;
      text-align: center;
    }

    a.button:hover {
      background: #005dd1;
    }

    @media (max-width: 400px) {
      .buttons {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <p>Link zu eurem Pad:</p>
    <div class="buttons">
      <a class="button" href="https://etherpad.wikimedia.org/p/4SxmUYlbL3D0D8bNM6g7" target="_blank">Pad öffnen</a>
      <a class="button" href="#">Mehr Optionen</a>
    </div>
  </div>
</body>
</html>
